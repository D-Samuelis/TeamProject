services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    depends_on:
      - mysql
    ports:
      - "8080:80"
    environment:
      PMA_HOST: ${PMA_HOST}
      PMA_USER: ${PMA_USER}
      PMA_PASSWORD: ${PMA_PASSWORD}

  redis:
    image: redis:alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  stt-gateway:
    build: ./whisper
    command: uvicorn gateway:app --host 0.0.0.0 --port 8000
    ports:
      - "8001:8000"
    volumes:
      - whisper-audio:/tmp/audio
    environment:
      - REDIS_URL=redis://redis:6379/0
      - AUDIO_DIR=/tmp/audio

  stt-worker:
    build: ./whisper
    command: python worker.py
    volumes:
      - whisper-audio:/tmp/audio
      - whisper-model-cache:/root/.cache/huggingface
    environment:
      - REDIS_URL=redis://redis:6379/0
      - AUDIO_DIR=/tmp/audio

  mcp-client:
    build: ./mcp-client
    ports:
      - "8002:8001"
    environment:
      - MCP_SERVER=http://host.docker.internal:8000/mcp
      - MCP_OLLAMA_URL=http://host.docker.internal:11434/api/chat
      - MCP_OLLAMA_MODEL=qwen3:8b
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  mysql_data:
  whisper-audio:
  whisper-model-cache: