services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./laravel:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - laravel

  laravel:
    build: ./laravel
    volumes:
      - ./laravel:/var/www
      - laravel_storage:/var/www/storage
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_USER: laravel
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    depends_on:
      - mysql
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_USER: laravel
      PMA_PASSWORD: secret

  redis:
    image: redis:alpine
    restart: unless-stopped

  stt-gateway:
    build: ./whisper
    image: whisper-service
    command: uvicorn gateway:app --host 0.0.0.0 --port 8000
    ports:
      - "8002:8000"
    volumes:
      - whisper-audio:/tmp/audio
    environment:
      - REDIS_URL=redis://redis:6379/0
      - AUDIO_DIR=/tmp/audio

  stt-worker:
    image: whisper-service
    command: python worker.py
    volumes:
      - whisper-audio:/tmp/audio
      - whisper-model-cache:/root/.cache/huggingface
    environment:
      - REDIS_URL=redis://redis:6379/0
      - AUDIO_DIR=/tmp/audio

volumes:
  mysql_data:
  whisper-audio:
  whisper-model-cache:
  laravel_storage: